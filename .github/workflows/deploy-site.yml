# deploy-site — builds site-astro/ and deploys it to Cloudflare Pages.
#
# The Cloudflare Pages project `jetson-arena` itself is created (and its
# custom domains/DNS wired) by the operator runbook, docs/hosting-runbook.md
# — NOT by this workflow. This workflow assumes that project already exists
# and only builds + deploys into it.
name: deploy-site

on:
  push:
    branches: [main]
    paths:
      - "site-astro/**"
  workflow_dispatch:

concurrency:
  group: deploy-site
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: site-astro/package-lock.json

      - name: npm ci
        working-directory: site-astro
        run: npm ci

      - name: npm run build
        working-directory: site-astro
        run: npm run build

      - name: Deploy to Cloudflare Pages
        # wrangler version is pinned via site-astro/package.json (devDependency,
        # exact version) and locked in package-lock.json; --no-install forces
        # npx to use that installed copy instead of resolving latest from npm.
        working-directory: site-astro
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx --no-install wrangler pages deploy dist --project-name jetson-arena
